name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add routed page fallbacks
        run: |
          mkdir -p dist/privacy-policy dist/terms-conditions
          cp dist/index.html dist/privacy-policy/index.html
          cp dist/index.html dist/terms-conditions/index.html
          perl -pi -e 's#href="\./habits-logo\.png"#href="../habits-logo.png"#g; s#src="\./assets/#src="../assets/#g; s#href="\./assets/#href="../assets/#g' dist/privacy-policy/index.html dist/terms-conditions/index.html
          cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
